name: Update Release Notes

on:
  push:
    branches:
      - master
    paths:
      - 'docs/releases/*.md'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release-Version ohne v-Präfix, z. B. 1.4.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: update-release-notes
  cancel-in-progress: false

jobs:
  update-release-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update existing GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          EVENT_BEFORE: ${{ github.event.before }}
          EVENT_SHA: ${{ github.sha }}
        shell: pwsh
        run: |
          if ($env:EVENT_NAME -eq 'workflow_dispatch') {
            $versions = @($env:INPUT_VERSION)
          } else {
            if (-not [string]::IsNullOrWhiteSpace($env:EVENT_BEFORE) -and $env:EVENT_BEFORE -notmatch '^0+$') {
              $changedFiles = git diff --name-only $env:EVENT_BEFORE $env:EVENT_SHA
            } else {
              $changedFiles = git diff-tree --no-commit-id --name-only -r $env:EVENT_SHA
            }

            $versions = @($changedFiles |
              Where-Object { $_ -match '^docs/releases/(\d+\.\d+\.\d+)\.md$' } |
              ForEach-Object { [regex]::Match($_, '^docs/releases/(\d+\.\d+\.\d+)\.md$').Groups[1].Value } |
              Sort-Object -Unique)
          }

          if ($versions.Count -eq 0) {
            Write-Host 'Keine konkrete Release-Notes-Datei im Push gefunden.'
            return
          }

          foreach ($version in $versions) {
            if ($version -notmatch '^\d+\.\d+\.\d+$') {
              throw "Version muss im Format Major.Minor.Patch angegeben werden, z. B. 1.0.0."
            }

            $notesPath = "docs/releases/$version.md"
            if (-not (Test-Path -LiteralPath $notesPath)) {
              throw "Release-Notes-Datei nicht gefunden: $notesPath"
            }

            Write-Host "Aktualisiere GitHub-Release v$version aus $notesPath"
            & gh release edit "v$version" --notes-file $notesPath
          }
