name: Update Release Notes

on:
  push:
    branches:
      - master
    paths:
      - 'docs/releases/1.0.0.md'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release-Version ohne v-Praefix, z. B. 1.0.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: update-release-notes
  cancel-in-progress: false

jobs:
  update-release-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update existing GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        shell: pwsh
        run: |
          $version = if ($env:EVENT_NAME -eq 'workflow_dispatch') { $env:INPUT_VERSION } else { '1.0.0' }
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version muss im Format Major.Minor.Patch angegeben werden, z. B. 1.0.0."
          }

          $notesPath = "docs/releases/$version.md"
          if (-not (Test-Path -LiteralPath $notesPath)) {
            throw "Release-Notes-Datei nicht gefunden: $notesPath"
          }

          & gh release edit "v$version" --notes-file $notesPath
